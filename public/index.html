<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="description" content="Économio - L'IA qui compare tes factures et te fait économiser jusqu'à 576€ par an" />
    <title>Économio ⚡ Économise sur toutes tes factures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Cabinet+Grotesk:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #050810; color: #E8F1FF; font-family: 'Space Grotesk', system-ui, sans-serif; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0.4); } 50% { box-shadow: 0 0 0 12px rgba(0, 200, 255, 0); } }
      ::selection { background: rgba(0, 200, 255, 0.3); }
      input, select, button, textarea { font-family: inherit; }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
